services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: localloop
      POSTGRES_USER: localloop
      POSTGRES_PASSWORD: localloop
    ports: ["5432:5432"]
    volumes: ["./infra/init.sql:/docker-entrypoint-initdb.d/init.sql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localloop -d localloop"]
      interval: 5s
      timeout: 3s
      retries: 10
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    build: ./apps/api
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://localloop:localloop@postgres:5432/localloop
      MONGO_URL: mongodb://mongo:27017/localloop
      REDIS_URL: redis://redis:6379
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
  web:
    build: ./apps/web
    ports: ["5173:80"]
    depends_on: [api]
